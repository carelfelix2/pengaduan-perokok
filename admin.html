<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — KawasanSehat</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body class="admin-login-page">

  <div class="login-container">
    <div class="login-card">
      <div class="login-brand">
        <span class="brand-icon"><i class="ti ti-wind-off"></i></span>
        <span class="login-brand-text">KawasanSehat</span>
      </div>
      <p class="login-subtitle">Panel Admin — Sistem Pengaduan</p>

      <div class="login-error" id="login-error">
        <i class="ti ti-alert-circle"></i>
        <span id="login-error-msg">Username atau password salah.</span>
      </div>

      <form class="login-form" id="login-form" onsubmit="return handleLogin(event)">
        <div class="field-group">
          <label class="field-label" for="login-username">Username</label>
          <div class="input-wrap">
            <i class="ti ti-user field-icon"></i>
            <input type="text" id="login-username" class="field-input" placeholder="Masukkan username" value="admin" autocomplete="username">
          </div>
        </div>

        <div class="field-group">
          <label class="field-label" for="login-password">Password</label>
          <div class="input-wrap">
            <i class="ti ti-lock field-icon"></i>
            <input type="password" id="login-password" class="field-input" placeholder="Masukkan password" autocomplete="current-password">
          </div>
        </div>

        <button type="submit" class="login-btn" id="login-btn">
          <i class="ti ti-login"></i> Masuk ke Dashboard
        </button>
      </form>

      <div class="login-footer">
        <a href="index.html"><i class="ti ti-arrow-left"></i> Kembali ke Beranda</a>
      </div>
    </div>
  </div>

  <script>
    // Admin login handler
    function handleLogin(e) {
      e.preventDefault();

      var username = document.getElementById('login-username').value.trim();
      var password = document.getElementById('login-password').value.trim();
      var errorEl = document.getElementById('login-error');
      var errorMsg = document.getElementById('login-error-msg');
      var btn = document.getElementById('login-btn');

      // Default credentials
      if (username === 'admin' && password === 'kawasansehat2025') {
        // Set login flag
        localStorage.setItem('kawasansehat_admin', 'true');

        // Show loading state
        btn.disabled = true;
        btn.innerHTML = '<i class="ti ti-loader-2" style="animation:spin 1s linear infinite;"></i> Memproses...';

        // Add spin animation
        var style = document.createElement('style');
        style.textContent = '@keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }';
        document.head.appendChild(style);

        // Redirect after brief delay
        setTimeout(function() {
          window.location.href = 'dashboard.html';
        }, 600);

        return false;
      }

      // Show error
      errorEl.style.display = 'flex';
      errorMsg.textContent = 'Username atau password tidak valid.';

      // Shake animation
      var card = document.querySelector('.login-card');
      card.style.animation = 'shake 0.4s ease';
      setTimeout(function() { card.style.animation = ''; }, 400);

      return false;
    }

    // Check if already logged in
    if (localStorage.getItem('kawasansehat_admin') === 'true') {
      window.location.href = 'dashboard.html';
    }
  </script>

  <style>
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
  </style>

</body>
</html>
